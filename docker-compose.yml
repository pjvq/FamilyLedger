version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: familyledger-db
    environment:
      POSTGRES_USER: familyledger
      POSTGRES_PASSWORD: familyledger
      POSTGRES_DB: familyledger
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U familyledger"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: familyledger-server
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: familyledger
      DB_PASSWORD: familyledger
      DB_NAME: familyledger
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-at-least-32-chars}
      GRPC_PORT: "50051"
      WS_PORT: "8080"
      WS_TOKEN_CHECK_INTERVAL: "1s"
      AUTH_RATE_RPS: "50"
      AUTH_RATE_BURST: "100"
    ports:
      - "50051:50051"
      - "8080:8080"
    restart: unless-stopped

volumes:
  pgdata:

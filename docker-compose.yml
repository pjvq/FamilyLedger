version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: familyledger-db
    environment:
      POSTGRES_USER: familyledger
      POSTGRES_PASSWORD: familyledger
      POSTGRES_DB: familyledger
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U familyledger"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: familyledger-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: familyledger
      DB_PASSWORD: familyledger
      DB_NAME: familyledger
      DB_SSLMODE: disable
      JWT_SECRET: familyledger-dev-secret-change-in-production
      GRPC_PORT: "50051"
      WS_PORT: "8080"
    ports:
      - "50051:50051"
      - "8080:8080"

volumes:
  pgdata:

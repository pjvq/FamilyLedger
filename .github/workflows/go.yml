name: Go Tests
on:
  push:
    paths:
      - 'server/**'
      - 'proto/**'
      - '.github/workflows/go.yml'
  pull_request:
    paths:
      - 'server/**'
      - 'proto/**'
      - '.github/workflows/go.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: server/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run tests (with retry for flaky)
        run: |
          gotestsum --rerun-fails=2 --rerun-fails-max-failures=3 \
            --format short-verbose \
            --packages ./... \
            -- -count=1 -race -coverprofile=coverage.out -timeout=60s

      - name: Vet
        run: go vet ./...

      - name: Coverage report
        run: |
          if [ ! -f coverage.out ]; then
            echo "::warning::No coverage file found (skipping gate)"
            exit 0
          fi
          # Filter out generated proto code for accurate coverage metrics
          grep -v '^github.com/familyledger/server/proto/' coverage.out > coverage_filtered.out
          COVERAGE=$(go tool cover -func=coverage_filtered.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "## 📈 Go Coverage (source only): ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY
          echo "Total coverage (excl. proto): ${COVERAGE}%"
          # Regression gate: fail if source coverage drops below 80%.
          # Current baseline: ~82%. Target: 85% (Issue #64.6).
          if (( $(echo "$COVERAGE < 80.0" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below 80% minimum threshold"
            exit 1
          fi

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: server/coverage.out
          retention-days: 7

      - name: Coverage delta comment
        if: github.event_name == 'pull_request' && (success() || failure())
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            let current = 0;
            try {
              const out = execSync('go tool cover -func=coverage_filtered.out | grep total', { cwd: 'server' }).toString();
              const match = out.match(/(\d+\.\d+)%/);
              if (match) current = parseFloat(match[1]);
            } catch (e) { current = 0; }

            let base = null;
            try {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'go.yml',
                branch: 'main',
                status: 'success',
                per_page: 1,
              });
              if (runs.data.workflow_runs.length > 0) {
                base = 82.2; // TODO: auto-update from main run artifacts or .github/baselines.json
              }
            } catch (e) { /* no base */ }

            const delta = base !== null ? (current - base).toFixed(1) : null;
            const emoji = delta > 0 ? '📈' : delta < 0 ? '📉' : '➡️';
            const deltaStr = delta !== null ? ` (${delta > 0 ? '+' : ''}${delta}% vs main)` : '';

            const body = [
              `## ${emoji} Go Coverage: ${current.toFixed(1)}%${deltaStr}`,
              '',
              '| Metric | Value |',
              '|--------|-------|',
              `| Current | ${current.toFixed(1)}% |`,
              base !== null ? `| Main baseline | ${base}% |` : null,
              delta !== null ? `| Delta | ${delta > 0 ? '+' : ''}${delta}% |` : null,
              `| Threshold | 80.0% |`,
            ].filter(Boolean).join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body.includes('Go Coverage:'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  integration:
    name: Integration Tests (PostgreSQL)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: server/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run integration tests
        run: go test ./internal/integration/... ./internal/benchmark/... -tags=integration -count=1 -timeout=180s -v

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: server/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run benchmarks
        run: |
          go test ./internal/benchmark/... -tags=integration \
            -bench=. -benchtime=3s -count=3 | tee benchmark-results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: server/benchmark-results.txt
          retention-days: 30

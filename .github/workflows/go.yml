name: Go Tests
on:
  push:
    paths:
      - 'server/**'
      - 'proto/**'
      - '.github/workflows/go.yml'
  pull_request:
    paths:
      - 'server/**'
      - 'proto/**'

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: server/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Run tests
        run: go test ./... -count=1 -race -coverprofile=coverage.out -timeout=60s

      - name: Vet
        run: go vet ./...

      - name: Coverage report (target 85% by W15)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          echo "📈 Target: 85% by W15. Current gate: 20% (prevent regression)"
          if (( $(echo "$COVERAGE < 20.0" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below 20% minimum threshold"
            exit 1
          fi

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: server/coverage.out
          retention-days: 7

  integration:
    name: Integration Tests (PostgreSQL)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: server/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run integration tests
        run: go test ./internal/integration/... ./internal/benchmark/... -tags=integration -count=1 -timeout=180s -v

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: server/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run benchmarks
        run: |
          go test ./internal/benchmark/... -tags=integration \
            -bench=. -benchtime=3s -count=3 | tee benchmark-results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: server/benchmark-results.txt
          retention-days: 30

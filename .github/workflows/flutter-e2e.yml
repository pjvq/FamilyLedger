name: E2E Integration (Flutter + Go Server)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DB_HOST: localhost
  DB_PORT: '5432'
  DB_USER: familyledger
  DB_PASSWORD: familyledger
  DB_NAME: familyledger_e2e
  DB_SSLMODE: disable
  JWT_SECRET: ci-test-secret-do-not-use-in-production
  GRPC_PORT: '50051'
  WS_PORT: '8080'
  AUTH_RATE_RPS: '100'
  AUTH_RATE_BURST: '200'
  ENABLE_GRPC_REFLECTION: 'true'

jobs:
  flutter-e2e:
    name: Flutter ↔ Go Server E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: familyledger
          POSTGRES_PASSWORD: familyledger
          POSTGRES_DB: familyledger_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U familyledger"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # --- Go Server Build ---
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: server/go.sum

      - name: Build Go server
        working-directory: server
        run: go build -o bin/server ./cmd/server

      # --- Run Migrations ---
      - name: Install migrate CLI
        run: |
          curl -sSL "https://github.com/golang-migrate/migrate/releases/download/v4.17.0/migrate.linux-amd64.tar.gz" | tar xz
          sudo mv migrate /usr/local/bin/

      - name: Run migrations
        run: |
          migrate -path server/migrations \
            -database "postgres://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=${DB_SSLMODE}" up

      # --- Start Server ---
      - name: Start Go server
        run: |
          server/bin/server &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          # Wait for gRPC ready
          for i in $(seq 1 30); do
            if nc -z localhost 50051 2>/dev/null; then
              echo "gRPC ready after ${i}s"
              break
            fi
            sleep 1
          done
          # Wait for WS ready
          for i in $(seq 1 10); do
            if nc -z localhost 8080 2>/dev/null; then
              echo "WebSocket ready"
              break
            fi
            sleep 1
          done

      # --- Flutter E2E Tests ---
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        working-directory: app
        run: flutter pub get

      - name: Run E2E integration tests
        working-directory: app
        run: |
          # Skip if no test files exist yet (W1 = harness skeleton only)
          TEST_FILES=$(find test/integration_test -name '*_test.dart' 2>/dev/null | wc -l | tr -d ' ')
          if [ "$TEST_FILES" -eq 0 ]; then
            echo "No E2E test files found yet (harness skeleton only). Skipping."
            exit 0
          fi
          flutter test test/integration_test/ \
            --reporter compact \
            --timeout 30s \
            --concurrency 1
        env:
          GRPC_HOST: localhost
          GRPC_PORT: '50051'
          WS_HOST: localhost
          WS_PORT: '8080'

      # --- Cleanup ---
      - name: Stop server
        if: always()
        run: kill $SERVER_PID 2>/dev/null || true

      - name: Cleanup test schemas
        if: always()
        run: |
          PGPASSWORD=$DB_PASSWORD psql -h $DB_HOST -U $DB_USER -d $DB_NAME -c \
            "DO \$\$ DECLARE r RECORD; BEGIN FOR r IN SELECT schema_name FROM information_schema.schemata WHERE schema_name LIKE 'test_%' LOOP EXECUTE 'DROP SCHEMA ' || r.schema_name || ' CASCADE'; END LOOP; END \$\$;" \
            2>/dev/null || true

name: familyledger
description: "FamilyLedger - 家庭资产管理"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  meta: ^1.11.0
  cupertino_icons: ^1.0.8
  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  # Local database
  drift: ^2.25.0
  sqlite3_flutter_libs: ^0.5.30
  path_provider: ^2.1.5
  path: ^1.9.1

  # Pin iOS platform packages to avoid objective_c FFI issue on iOS 26 simulator
  shared_preferences_foundation: 2.4.0
  path_provider_foundation: 2.4.0
  # gRPC
  grpc: ^4.1.0
  protobuf: ^4.1.0
  fixnum: ^1.1.1
  # Networking
  web_socket_channel: ^3.0.2
  # Charts
  fl_chart: ^0.70.2
  # Routing
  go_router: ^14.0.0
  # Utils
  uuid: ^4.5.1
  characters: ^1.3.0
  intl: ^0.20.2
  shared_preferences: ^2.2.3
  # Haptic feedback
  vibration: ^2.0.0
  # Share / Export
  share_plus: ^10.0.0
  # File / Image picker
  file_picker: ^8.0.0
  image_picker: ^1.0.0
  excel: ^4.0.6
  fast_gbk: ^1.0.0
  flutter_secure_storage: ^10.2.0
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0
  flutter_timezone: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  crypto: ^3.0.0
  # Code generation
  riverpod_generator: ^2.6.3
  drift_dev: ^2.25.0
  build_runner: ^2.4.15
  mocktail: ^1.0.5
  flutter_launcher_icons: ^0.14.1

# App 启动图标生成配置（占位版：微信绿 #07C160 底 + 白「账」字）
# 重新生成: cd app && dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#07C160"
  adaptive_icon_background: "#07C160"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/certs/ca.pem
  # fonts:
  #   - family: DINRoundPro
  #     fonts:
  #       - asset: assets/fonts/DINRoundPro.otf
  #       - asset: assets/fonts/DINRoundPro-Bold.otf
  #         weight: 700

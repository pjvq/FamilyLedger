<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34D399"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <!-- Coin/Circle -->
  <circle cx="512" cy="480" r="260" fill="white" opacity="0.15"/>
  <circle cx="512" cy="480" r="200" fill="white" opacity="0.95"/>
  <!-- ¥ symbol centered -->
  <text x="512" y="560" font-family="SF Pro Display, -apple-system, Arial, sans-serif" font-size="280" font-weight="700" fill="#059669" text-anchor="middle">¥</text>
  <!-- Small family dots below -->
  <circle cx="442" cy="760" r="28" fill="white" opacity="0.9"/>
  <circle cx="512" cy="760" r="28" fill="white" opacity="0.9"/>
  <circle cx="582" cy="760" r="28" fill="white" opacity="0.9"/>
  <!-- Connection line -->
  <line x1="442" y1="760" x2="582" y2="760" stroke="white" stroke-width="8" opacity="0.5"/>
</svg>

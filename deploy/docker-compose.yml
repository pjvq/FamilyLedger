version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: familyledger-db
    environment:
      POSTGRES_USER: ${DB_USER:-familyledger}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_DB: ${DB_NAME:-familyledger}
    ports:
      - "127.0.0.1:5432:5432"  # localhost only — for local debugging/migration
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-familyledger}"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: familyledger-server
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-familyledger}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      DB_NAME: ${DB_NAME:-familyledger}
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      GRPC_PORT: "${GRPC_PORT:-50051}"
      WS_PORT: "${WS_PORT:-8080}"
      WS_TOKEN_CHECK_INTERVAL: "${WS_TOKEN_CHECK_INTERVAL:-1s}"
      AUTH_RATE_RPS: "${AUTH_RATE_RPS:-10}"
      AUTH_RATE_BURST: "${AUTH_RATE_BURST:-20}"
      OAUTH_MODE: ${OAUTH_MODE:-mock}
      TLS_CERT_FILE: ${TLS_CERT_FILE:-/etc/tls/server.pem}
      TLS_KEY_FILE: ${TLS_KEY_FILE:-/etc/tls/server-key.pem}
      TLS_CA_FILE: ${TLS_CA_FILE:-}
      TLS_MIN_VERSION: ${TLS_MIN_VERSION:-1.2}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    ports:
      - "50051:50051"
      - "8080:8080"
    volumes:
      - /etc/familyledger/tls:/etc/tls:ro
    restart: unless-stopped

volumes:
  pgdata:

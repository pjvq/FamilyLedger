syntax = "proto3";

package familyledger.transaction.v1;

option go_package = "github.com/familyledger/server/proto/transaction";

import "google/protobuf/timestamp.proto";

service TransactionService {
  rpc CreateTransaction(CreateTransactionRequest) returns (CreateTransactionResponse);
  rpc UpdateTransaction(UpdateTransactionRequest) returns (UpdateTransactionResponse);
  rpc DeleteTransaction(DeleteTransactionRequest) returns (DeleteTransactionResponse);
  rpc BatchDeleteTransactions(BatchDeleteTransactionsRequest) returns (BatchDeleteTransactionsResponse);
  rpc UploadTransactionImage(UploadTransactionImageRequest) returns (UploadTransactionImageResponse);
  rpc ListTransactions(ListTransactionsRequest) returns (ListTransactionsResponse);
  rpc GetCategories(GetCategoriesRequest) returns (GetCategoriesResponse);
  // Category management
  rpc CreateCategory(CreateCategoryRequest) returns (CreateCategoryResponse);
  rpc UpdateCategory(UpdateCategoryRequest) returns (UpdateCategoryResponse);
  rpc DeleteCategory(DeleteCategoryRequest) returns (DeleteCategoryResponse);
  rpc ReorderCategories(ReorderCategoriesRequest) returns (ReorderCategoriesResponse);
}

enum TransactionType {
  TRANSACTION_TYPE_UNSPECIFIED = 0;
  TRANSACTION_TYPE_INCOME = 1;
  TRANSACTION_TYPE_EXPENSE = 2;
}

message Transaction {
  string id = 1;
  string user_id = 2;
  string account_id = 3;
  string category_id = 4;
  int64 amount = 5;          // 金额(分)
  string currency = 6;
  int64 amount_cny = 7;      // 人民币金额(分)
  double exchange_rate = 8;
  TransactionType type = 9;
  string note = 10;
  google.protobuf.Timestamp txn_date = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
  repeated string tags = 14;
  repeated string image_urls = 15;
}

message Category {
  string id = 1;
  string name = 2;
  string icon = 3;             // emoji fallback
  TransactionType type = 4;
  bool is_preset = 5;
  int32 sort_order = 6;
  string parent_id = 7;        // empty = main category
  string icon_key = 8;         // built-in icon key (e.g. "food_breakfast")
  repeated Category children = 9; // subcategories (populated in GetCategories)
}

message CreateTransactionRequest {
  string account_id = 1;
  string category_id = 2;
  int64 amount = 3;
  string currency = 4;
  int64 amount_cny = 5;
  double exchange_rate = 6;
  TransactionType type = 7;
  string note = 8;
  google.protobuf.Timestamp txn_date = 9;
  repeated string tags = 10;
  repeated string image_urls = 11;
}

message CreateTransactionResponse {
  Transaction transaction = 1;
}

message ListTransactionsRequest {
  string account_id = 1;               // 可选，按账户过滤
  google.protobuf.Timestamp start_date = 2;  // 可选，开始时间
  google.protobuf.Timestamp end_date = 3;    // 可选，结束时间
  int32 page_size = 4;
  string page_token = 5;               // 上一页最后一条的 id
  string family_id = 6;                // 可选，空=个人账户交易，有值=家庭账户交易
}

message ListTransactionsResponse {
  repeated Transaction transactions = 1;
  string next_page_token = 2;
  int32 total_count = 3;
}

message UpdateTransactionRequest {
  string transaction_id = 1;
  optional int64 amount = 2;          // 金额(分)
  optional string category_id = 3;
  optional string note = 4;
  optional string tags = 5;
  optional TransactionType type = 6;
  optional string currency = 7;
}

message UpdateTransactionResponse {
  Transaction transaction = 1;
}

message DeleteTransactionRequest {
  string transaction_id = 1;
}

message DeleteTransactionResponse {}

message BatchDeleteTransactionsRequest {
  repeated string transaction_ids = 1;  // 最多 100 条
}

message BatchDeleteTransactionsResponse {
  int32 deleted_count = 1;
}

message UploadTransactionImageRequest {
  string transaction_id = 1;  // 可选，可先上传后关联
  string filename = 2;
  bytes data = 3;             // 图片二进制数据，最大 5MB
  string content_type = 4;    // e.g. image/jpeg
}

message UploadTransactionImageResponse {
  string image_url = 1;       // 服务端返回的图片 URL
}

message GetCategoriesRequest {
  TransactionType type = 1;  // 可选，按类型过滤
}

message GetCategoriesResponse {
  repeated Category categories = 1; // tree: main categories with children populated
}

// ── Category CRUD ─────────────────────────────────────────────────

message CreateCategoryRequest {
  string name = 1;
  string icon_key = 2;          // built-in icon key
  TransactionType type = 3;     // income or expense
  string parent_id = 4;         // empty = create main category; non-empty = create subcategory
}

message CreateCategoryResponse {
  Category category = 1;
}

message UpdateCategoryRequest {
  string category_id = 1;
  optional string name = 2;
  optional string icon_key = 3;
}

message UpdateCategoryResponse {
  Category category = 1;
}

message DeleteCategoryRequest {
  string category_id = 1;
}

message DeleteCategoryResponse {}

message ReorderCategoriesRequest {
  repeated CategoryOrder orders = 1;
}

message CategoryOrder {
  string category_id = 1;
  int32 sort_order = 2;
}

message ReorderCategoriesResponse {}

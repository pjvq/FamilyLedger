syntax = "proto3";

package familyledger.account.v1;

option go_package = "github.com/familyledger/server/proto/account";

import "google/protobuf/timestamp.proto";

service AccountService {
  rpc CreateAccount(CreateAccountRequest) returns (CreateAccountResponse);
  rpc ListAccounts(ListAccountsRequest) returns (ListAccountsResponse);
  rpc GetAccount(GetAccountRequest) returns (GetAccountResponse);
  rpc UpdateAccount(UpdateAccountRequest) returns (UpdateAccountResponse);
  rpc DeleteAccount(DeleteAccountRequest) returns (DeleteAccountResponse);
  rpc TransferBetween(TransferBetweenRequest) returns (TransferBetweenResponse);
}

enum AccountType {
  ACCOUNT_TYPE_UNSPECIFIED = 0;
  ACCOUNT_TYPE_CASH = 1;
  ACCOUNT_TYPE_BANK_CARD = 2;
  ACCOUNT_TYPE_CREDIT_CARD = 3;
  ACCOUNT_TYPE_ALIPAY = 4;
  ACCOUNT_TYPE_WECHAT_PAY = 5;
  ACCOUNT_TYPE_INVESTMENT = 6;
  ACCOUNT_TYPE_OTHER = 7;
}

message Account {
  string id = 1;
  string user_id = 2;
  string family_id = 3; // empty if personal account
  string name = 4;
  AccountType type = 5;
  string currency = 6;
  string icon = 7;
  int64 balance = 8; // in cents
  bool is_active = 9;
  bool is_default = 10;
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}

message Transfer {
  string id = 1;
  string user_id = 2;
  string from_account_id = 3;
  string to_account_id = 4;
  int64 amount = 5; // in cents
  string note = 6;
  google.protobuf.Timestamp created_at = 7;
}

// CreateAccount
message CreateAccountRequest {
  string name = 1;
  AccountType type = 2;
  string currency = 3;
  string icon = 4;
  int64 initial_balance = 5; // in cents
  string family_id = 6; // empty for personal account
}

message CreateAccountResponse {
  Account account = 1;
}

// ListAccounts
message ListAccountsRequest {
  string family_id = 1; // empty to list personal accounts
  bool include_inactive = 2;
}

message ListAccountsResponse {
  repeated Account accounts = 1;
}

// GetAccount
message GetAccountRequest {
  string account_id = 1;
}

message GetAccountResponse {
  Account account = 1;
}

// UpdateAccount
message UpdateAccountRequest {
  string account_id = 1;
  optional string name = 2;
  optional string icon = 3;
  optional bool is_active = 4;
}

message UpdateAccountResponse {
  Account account = 1;
}

// DeleteAccount
message DeleteAccountRequest {
  string account_id = 1;
}

message DeleteAccountResponse {}

// TransferBetween
message TransferBetweenRequest {
  string from_account_id = 1;
  string to_account_id = 2;
  int64 amount = 3; // in cents
  string note = 4;
}

message TransferBetweenResponse {
  Transfer transfer = 1;
}
